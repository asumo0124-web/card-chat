<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>字卡聊天</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

<header class="topbar">
  <div class="profile">
    <div class="avatar" id="botAvatar"></div>
    <input type="file" id="botUpload" accept="image/*" hidden>

    <div>
      <div class="name">無名</div>
      <div class="status">在線</div>
    </div>
  </div>

  <button class="icon-btn">⋯</button>
</header>

<main id="chat" class="page active">
  <section class="messages"></section>

  <footer class="inputbar">
    <button class="round-btn">＋</button>
    <input placeholder="輸入訊息…" id="inputBox">
    <button class="round-btn dark" id="randomBtn">…</button>
    <button class="send-btn" id="sendBtn">➤</button>

    <div class="mini-avatar me-avatar" id="myAvatar"></div>
    <input type="file" id="myUpload" accept="image/*" hidden>
  </footer>
</main>

</div>

<script src="./app.js?v=1"></script>
</body>
</html>
