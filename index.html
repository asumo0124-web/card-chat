<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>字卡聊天</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="profile">
        <div class="avatar"></div>
        <div>
          <div class="name">無名</div>
          <div class="status"><span></span> 在線，但靈魂離線</div>
        </div>
      </div>
      <button class="icon-btn" onclick="openPanel('quick')">⋯</button>
    </header>

    <main id="chat" class="page active">
      <div class="filter-row">
        <button class="chip active">全部字卡</button>
        <button class="chip">安慰</button>
        <button class="chip">吐槽</button>
        <button class="chip off">發瘋 OFF</button>
      </div>

      <section class="messages">
        <div class="msg bot">
          <div class="mini-avatar"></div>
          <div class="bubble bot-bubble">你終於來了。</div>
        </div>
        <div class="msg me">
          <div class="bubble me-bubble">我來測試你是不是真的像人。</div>
          <div class="mini-avatar me-avatar"></div>
        </div>
        <div class="msg bot">
          <div class="mini-avatar"></div>
          <div class="bubble bot-bubble">
            <div class="quote">我來測試你是不是真的像人。</div>
            😂 那你可能要失望了，我比較像一個躲在手機裡的異常現象。
          </div>
        </div>
        <div class="sticker-msg">[ 隨機表情包 ]</div>
        <div class="typing">無名 正在輸入…</div>
      </section>

      <footer class="inputbar">
        <button class="round-btn" onclick="openPanel('plus')">＋</button>
        <input placeholder="輸入訊息…" />
        <button class="round-btn dark">…</button>
        <button class="send-btn">➤</button>
      </footer>
    </main>

    <main id="sessions" class="page">
      <h1>會話</h1>
      <div class="card session-card">
        <div class="avatar small"></div>
        <div>
          <b>無名</b>
          <p>字卡 248｜表情包 36｜今日 12 條</p>
        </div>
        <span>›</span>
      </div>
      <div class="card session-card">
        <div class="avatar small alt"></div>
        <div>
          <b>瘋狂版本</b>
          <p>字卡 109｜表情包 12</p>
        </div>
        <span>›</span>
      </div>
      <button class="primary">＋ 新建會話</button>
    </main>

    <main id="cards" class="page">
      <h1>字卡庫</h1>
      <input class="search" placeholder="搜尋字卡…" />
      <div class="tabs"><button class="active">主字卡</button><button>Emoji</button><button>表情包</button></div>
      <div class="group-row">
        <button class="group purple">安慰</button>
        <button class="group green">吐槽</button>
        <button class="group orange">發瘋</button>
      </div>
      <div class="card list-item"><span>你已經做得很好了</span><em class="tag purple">安慰</em></div>
      <div class="card list-item"><span>這個世界先不要太荒謬</span><em class="tag green">吐槽</em></div>
      <button class="primary">＋ 批量新增</button>
    </main>

    <main id="settings" class="page">
      <h1>設定</h1>
      <div class="setting-list">
        <div onclick="openPanel('pace')">節奏 <span>›</span></div>
        <div>外觀 <span>夜間 / 背景 / 氣泡 ›</span></div>
        <div>表達 <span>Emoji / 表情包 ›</span></div>
        <div>消息統計 & 收藏 <span>›</span></div>
        <div>資料備份 <span>單會話 / 全量 ›</span></div>
      </div>
    </main>

    <nav class="bottomnav">
      <button class="active" onclick="showPage('chat', this)">聊天</button>
      <button onclick="showPage('sessions', this)">會話</button>
      <button onclick="showPage('cards', this)">字卡庫</button>
      <button onclick="showPage('settings', this)">設定</button>
    </nav>
  </div>

  <div id="sheet" class="sheet hidden">
    <div class="sheet-card">
      <button class="close" onclick="closePanel()">×</button>
      <div id="sheet-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
